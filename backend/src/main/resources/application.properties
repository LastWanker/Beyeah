server.port=23333

spring.datasource.name=beyeah1211-datasource
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:beyeah}?useUnicode=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&autoReconnect=true&useSSL=false&allowMultiQueries=true&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

mybatis.mapper-locations=classpath:mapper/*Mapper.xml

app.auth.token-secret=${APP_AUTH_TOKEN_SECRET:change-me-in-production}
app.auth.token-expire-seconds=${APP_AUTH_TOKEN_EXPIRE_SECONDS:259200}
app.admin-auth.token-secret=${APP_ADMIN_AUTH_TOKEN_SECRET:${APP_AUTH_TOKEN_SECRET:change-me-in-production}-admin}
app.admin-auth.token-expire-seconds=${APP_ADMIN_AUTH_TOKEN_EXPIRE_SECONDS:43200}
app.auth.login.max-attempts=${APP_AUTH_LOGIN_MAX_ATTEMPTS:5}
app.auth.login.window-seconds=${APP_AUTH_LOGIN_WINDOW_SECONDS:600}
app.auth.login.lock-seconds=${APP_AUTH_LOGIN_LOCK_SECONDS:900}
app.order.auto-close-seconds=${APP_ORDER_AUTO_CLOSE_SECONDS:1800}
app.order.auto-close-batch-size=${APP_ORDER_AUTO_CLOSE_BATCH_SIZE:100}
app.order.auto-close-initial-delay-ms=${APP_ORDER_AUTO_CLOSE_INITIAL_DELAY_MS:30000}
app.order.auto-close-fixed-delay-ms=${APP_ORDER_AUTO_CLOSE_FIXED_DELAY_MS:60000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:22223,http://127.0.0.1:22223,http://localhost:5173,http://127.0.0.1:5173}

logging.pattern.level=%5p [%X{traceId:-}]
